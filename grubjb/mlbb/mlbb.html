<!DOCTYPE html>
<html lang="id">
<head>

</head>

  <div class="anime-left"></div>

  <main class="container">

    <div class="socials">

      <a class="social-tiktok" href="#">
        <i class="fa-brands fa-tiktok"></i>
      </a>

      <a class="social-instagram" href="#">
        <i class="fa-brands fa-instagram"></i>
      </a>

      <a class="social-telegram" href="#">

    <div class="logo-box">
      <img src="" id="logo" alt="logo">
    </div>

    <!-- TITLE -->
    <h1 id="title"></h1>

    <!-- BIO -->
    <p class="desc" id="bio"></p>

    <!-- AUTO BUTTON -->
